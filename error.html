<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate & Business</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Orbitron:wght=500;700;900&family=Syncopate:wght=700&display=swap">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="error.css">
    <link rel="stylesheet" href="root.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body class="error-page-body">

    <main class="error-container">
        <!-- Floating Ambient Background Orbs -->
        <div class="error-glow-orb left-orb"></div>
        <div class="error-glow-orb right-orb"></div>

        <div class="error-content-box">
            <!-- Animated Graphic Canvas -->
            <div class="error-visual">
                <div class="glitch-number" data-text="404">404</div>
                <!-- Premium Decorative Orbital Ring Structure -->
                <div class="radar-box">
                    <span class="radar-line"></span>
                    <span class="radar-line"></span>
                </div>
            </div>

            <!-- Error Notification Typography -->
            <h1 class="error-heading">Lost in Expansion</h1>
            <p class="error-message">
                The corporate destination you are searching for has migrated coordinates or no longer exists within our system architecture.
            </p>

            <!-- Interactive Action Triggers -->
            <div class="error-action-row">
                <a href="index.html" class="btn btn-primary">Return Home</a>
                <!-- <a href="contact.html" class="btn btn-outline error-sec-btn">Report Issue</a> -->
            </div>
        </div>
    </main>

</body>
</html>
